# docker compose untuk menjalankan qdrant dan backend rag
# cara pakai: docker compose up --build

services:
  # database vektor qdrant
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: quran-qdrant
    ports:
      - "6333:6333"   # rest api
      - "6334:6334"   # grpc
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # backend api (FastAPI + rag pipeline)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quran-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - AUTH_ENABLED=true
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # mount firebase credentials (opsional, kalau ada)
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro

volumes:
  qdrant_data:
    driver: local
