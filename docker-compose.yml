# ============================================================
# Docker Compose — Orkestrasi Qdrant + Backend RAG
# ============================================================
# Menjalankan seluruh stack dengan satu perintah:
#   docker compose up --build
# ============================================================

services:
  # ── Qdrant Vector Database ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: quran-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (FastAPI + RAG) ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quran-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - AUTH_ENABLED=true
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Mount Firebase credentials (opsional, jika ada)
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro

volumes:
  qdrant_data:
    driver: local
